name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crate/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crate/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.mjs

      - name: Package artifact
        run: tar -czf playground.tar.gz -C build .

      - name: Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # On PRs, preview the next release version
      - name: Preview release version
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          OUTPUT=$(unset GITHUB_ACTIONS; npx semantic-release --dry-run --no-ci --branches ${{ github.head_ref }} 2>&1) || true
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
          if [ -n "$VERSION" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "This PR will release **v${VERSION}**"
          fi
