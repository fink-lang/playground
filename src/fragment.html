<!-- Fink playground fragment — embed this in a page that provides:
     - monaco.css loaded
     - Hack (or equivalent monospace) font loaded
     - --fink-editor-* CSS variables set (see src/theme.ts for full list)
-->
<style>
  .fink-playground {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    background: var(--fink-editor-bg, #1e1e1e);
    color: var(--fink-editor-fg, #cccccc);
  }

  .fink-playground-workspace {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  #fink-editor {
    flex: 1;
    min-width: 0;
    max-width: 80ch;
  }

  .fink-playground-right-pane {
    flex: 1;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--fink-editor-border, #3e3e42);
    background: var(--fink-editor-bg, #1e1e1e);
  }

  /* --- Tab bar (with Share button on the far right) --- */

  .fink-playground-tabs {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-bottom: 1px solid var(--fink-editor-border, #3e3e42);
    flex-shrink: 0;
  }

  .fink-playground-tabs-spacer { flex: 1; }

  .fink-tab {
    padding: 6px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fink-editor-fg-dim, #858585);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
  }
  .fink-tab:hover { color: var(--fink-editor-fg, #cccccc); }
  .fink-tab.active {
    color: var(--fink-editor-fg, #cccccc);
    border-bottom-color: var(--fink-editor-fg-dim, #858585);
  }

  #fink-share-btn {
    margin: 5px 8px;
    padding: 2px 10px;
    border: 1px solid var(--fink-editor-border, #3e3e42);
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    background: none;
    color: var(--fink-editor-fg-dim, #858585);
    align-self: center;
  }
  #fink-share-btn:hover { color: var(--fink-editor-fg, #ccc); border-color: var(--fink-editor-fg-dim, #858585); }
  #fink-share-btn.copied { color: var(--fink-editor-ok, #4ec9b0); border-color: var(--fink-editor-ok, #4ec9b0); }

  /* --- Tab content area --- */

  .fink-tab-content {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .fink-tab-panel {
    display: none;
    overflow-y: auto;
    position: absolute;
    inset: 0;
  }
  .fink-tab-panel.active { display: block; }
  /* Run panel is a flex column — override the block display only when active */
  #fink-run-panel { display: none; }
  #fink-run-panel.active { display: flex; overflow: hidden; }

  /* --- Token highlight decoration in editor --- */

  .fink-token-highlight {
    background: var(--fink-editor-highlight-bg, rgba(255, 255, 255, 0.12));
    border: 1px solid var(--fink-editor-highlight-border, rgba(255, 255, 255, 0.25));
    border-radius: 3px;
  }

  /* --- Tokens panel --- */

  #fink-tokens {
    padding: 8px 10px;
    display: none;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 4px;
  }
  #fink-tokens.active { display: flex; }

  .fink-token-pill {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    padding: 2px 7px;
    border: 1px solid var(--fink-editor-border, #3e3e42);
    border-radius: 3px;
    cursor: pointer;
    line-height: 1.4;
  }
  .fink-token-pill:hover {
    background: var(--fink-editor-surface, #252526);
  }
  .fink-token-pill.fink-token-active {
    background: var(--fink-editor-highlight-bg, rgba(255, 255, 255, 0.08));
    border-color: var(--fink-editor-fg-dim, #858585);
    outline: 1px solid var(--fink-editor-fg-dim, #858585);
  }

  .fink-token-kind {
    font-size: 12px;
    font-family: inherit;
  }

  .fink-token-src {
    font-size: 9px;
    font-family: "Hack", "Consolas", "Menlo", monospace;
    opacity: 0.5;
    max-width: 12ch;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* --- AST panel --- */

  #fink-ast {
    padding: 6px 0;
  }

  .fink-ast-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-top: 1px;
    padding-bottom: 1px;
    padding-right: 10px;
    cursor: pointer;
    line-height: 1.5;
    white-space: nowrap;
  }
  .fink-ast-row:hover {
    background: var(--fink-editor-surface, #252526);
  }
  .fink-ast-row.fink-ast-active {
    background: var(--fink-editor-highlight-bg, rgba(255, 255, 255, 0.07));
    outline: 1px solid var(--fink-editor-highlight-border, rgba(255, 255, 255, 0.15));
    outline-offset: -1px;
  }

  .fink-ast-chevron {
    flex-shrink: 0;
    width: 10px;
    font-size: 8px;
    color: var(--fink-editor-fg-dim, #858585);
    user-select: none;
    line-height: 1;
    /* vertical alignment tweak for the small triangle glyphs */
    position: relative;
    top: -1px;
  }
  .fink-ast-chevron:hover {
    color: var(--fink-editor-fg, #ccc);
  }

  .fink-ast-kind {
    font-size: 12px;
    font-family: inherit;
    flex-shrink: 0;
  }

  .fink-ast-label {
    font-size: 10px;
    font-family: "Hack", "Consolas", "Menlo", monospace;
    opacity: 0.55;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fink-ast-loc {
    font-size: 10px;
    font-family: "Hack", "Consolas", "Menlo", monospace;
    opacity: 0.3;
    margin-left: auto;
    padding-left: 12px;
    flex-shrink: 0;
  }

  .fink-ast-empty {
    padding: 12px 14px;
    font-size: 12px;
    color: var(--fink-editor-fg-dim, #858585);
    font-style: italic;
  }

  /* --- CPS panels --- */

  #fink-cps,
  #fink-cps-lifted,
  #fink-wat {
    overflow: hidden; /* Monaco manages its own scroll */
  }

  /* --- Run panel --- */

  #fink-run-panel {
    flex-direction: column;
  }

  .fink-run-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--fink-editor-border, #3e3e42);
    flex-shrink: 0;
  }

  #fink-run-btn {
    padding: 3px 14px;
    border: none;
    border-radius: 3px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    background: var(--fink-editor-btn-bg, #0e639c);
    color: #fff;
  }
  #fink-run-btn:hover:not(:disabled) { background: var(--fink-editor-btn-hover, #1177bb); }
  #fink-run-btn:disabled { opacity: 0.5; cursor: default; }

  #fink-output {
    padding: 12px 14px;
    font-family: "Hack", "Consolas", "Menlo", monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    color: var(--fink-editor-fg, #cccccc);
    margin: 0;
    flex: 1;
    overflow-y: auto;
  }
  #fink-output.running { color: var(--fink-editor-fg-dim, #858585); }
  #fink-output.ok      { color: var(--fink-editor-ok,  #4ec9b0); }
  #fink-output.error   { color: var(--fink-editor-err, #f44747); }

  /* --- Status bar --- */

  .fink-statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 22px;
    padding: 0 calc(10px + 5em);
    background: var(--fink-editor-surface, #252526);
    border-top: 1px solid var(--fink-editor-border, #3e3e42);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--fink-editor-fg-dim, #858585);
    font-family: "Hack", "Consolas", "Menlo", monospace;
    user-select: none;
  }

  .fink-statusbar-left  { display: flex; align-items: center; gap: 14px; }
  .fink-statusbar-right { display: flex; align-items: center; gap: 8px; }

  .fink-statusbar-btn {
    padding: 1px 6px;
    border: 1px solid transparent;
    border-radius: 2px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    background: none;
    color: var(--fink-editor-fg-dim, #858585);
    line-height: 1.4;
  }
  .fink-statusbar-btn:hover { color: var(--fink-editor-fg, #ccc); }
  .fink-statusbar-btn.active {
    color: var(--fink-editor-fg, #ccc);
    border-color: var(--fink-editor-border, #3e3e42);
  }
  .fink-statusbar-btn.active.error  { color: var(--fink-editor-err, #f44747); border-color: var(--fink-editor-err, #f44747); }
  .fink-statusbar-btn.active.warning { color: #cca700; border-color: #cca700; }
</style>

<div class="fink-playground">
  <div class="fink-playground-workspace">
    <div id="fink-editor"></div>
    <div class="fink-playground-right-pane">
      <div class="fink-playground-tabs">
        <button class="fink-tab active" data-tab="fink-run-panel">Run</button>
        <button class="fink-tab" data-tab="fink-tokens">Tokens</button>
        <button class="fink-tab" data-tab="fink-ast">AST</button>
        <button class="fink-tab" data-tab="fink-cps">CPS</button>
        <button class="fink-tab" data-tab="fink-cps-lifted">Lifted</button>
        <button class="fink-tab" data-tab="fink-wat">WAT</button>
        <span class="fink-playground-tabs-spacer"></span>
        <button id="fink-share-btn">Share</button>
      </div>
      <div class="fink-tab-content">
        <div id="fink-run-panel" class="fink-tab-panel active">
          <div class="fink-run-toolbar">
            <button id="fink-run-btn">&#9654; Run</button>
          </div>
          <pre id="fink-output">Click ▶ Run to execute.</pre>
        </div>
        <div id="fink-tokens" class="fink-tab-panel"></div>
        <div id="fink-ast" class="fink-tab-panel"></div>
        <div id="fink-cps" class="fink-tab-panel"></div>
        <div id="fink-cps-lifted" class="fink-tab-panel"></div>
        <div id="fink-wat" class="fink-tab-panel"></div>
      </div>
    </div>
  </div>
  <div class="fink-statusbar">
    <div class="fink-statusbar-left">
      <span id="fink-status-pos">Ln 1, Col 1</span>
      <span id="fink-status-parse"></span>
    </div>
    <div class="fink-statusbar-right">
      <button id="fink-toggle-errors"   class="fink-statusbar-btn active error">⓪ Errors</button>
      <button id="fink-toggle-warnings" class="fink-statusbar-btn active warning">⓪ Warnings</button>
    </div>
  </div>
</div>

<script type="module" src="playground.js"></script>
