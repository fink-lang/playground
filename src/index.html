<!DOCTYPE html>
<!-- Dev wrapper — simulates the embedding website. Not shipped in the artifact.
     Sets --fink-editor-* CSS variables and loads monaco.css + fonts, then
     includes the playground fragment. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground — ƒink</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">
  <link rel="stylesheet" href="monaco.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── fink editor theme variables ── */
    /* Uses light-dark() to exercise the same code path as the production site. */
    :root {
      color-scheme: light dark;

      --fink-editor-bg:           light-dark(#ffffff, #1e1e1e);
      --fink-editor-fg:           light-dark(#1e1e1e, #cccccc);
      --fink-editor-fg-dim:       light-dark(#6e7781, #858585);
      --fink-editor-surface:      light-dark(#f6f8fa, #252526);
      --fink-editor-border:       light-dark(#d0d7de, #3e3e42);
      --fink-editor-btn-bg:       light-dark(#0969da, #0e639c);
      --fink-editor-btn-hover:    light-dark(#0550ae, #1177bb);
      --fink-editor-ok:           light-dark(#1a7f37, #4ec9b0);
      --fink-editor-err:          light-dark(#cf222e, #f44747);

      --fink-editor-color-fn:       light-dark(#8250df, #DCDCAA);
      --fink-editor-color-ident:    light-dark(#0550ae, #4FC1FF);
      --fink-editor-color-rec-key:  light-dark(#0969da, #9CDCFE);
      --fink-editor-color-tag:      light-dark(#0550ae, #569CD6);
      --fink-editor-color-block:    light-dark(#0969da, #4FC1FF);
      --fink-editor-color-keyword:  light-dark(#cf222e, #569CD6);
      --fink-editor-color-control:  light-dark(#8250df, #C586C0);
      --fink-editor-color-operator: light-dark(#1e1e1e, #D4D4D4);
      --fink-editor-color-number:   light-dark(#0550ae, #B5CEA8);
      --fink-editor-color-string:   light-dark(#0a3069, #CE9178);
      --fink-editor-color-escape:   light-dark(#cf222e, #D7BA7D);
      --fink-editor-color-comment:  light-dark(#6e7781, #6A9955);
      --fink-editor-color-invalid:  light-dark(#cf222e, #F44747);
      --fink-editor-color-bracket:  light-dark(#9a6700, #BDBB85);
      --fink-editor-color-bracket2: light-dark(#8250df, #CC76D1);
      --fink-editor-color-bracket3: light-dark(#0969da, #4A9DF8);

      --fink-editor-highlight-bg:     light-dark(rgba(0, 0, 0, 0.07), rgba(255, 255, 255, 0.12));
      --fink-editor-highlight-border: light-dark(rgba(0, 0, 0, 0.15), rgba(255, 255, 255, 0.25));
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--fink-editor-bg);
      color: var(--fink-editor-fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body style="height:100%">
  <!-- playground fragment -->
  <div id="playground-mount" style="height:100%">
    <script>
      fetch('fragment.html').then(r => r.text()).then(html => {
        document.getElementById('playground-mount').innerHTML = html
        // Re-execute any script tags in the fragment
        const scripts = document.getElementById('playground-mount').querySelectorAll('script')
        for (const s of scripts) {
          const ns = document.createElement('script')
          if (s.type) ns.type = s.type
          if (s.src) ns.src = s.src
          else ns.textContent = s.textContent
          s.replaceWith(ns)
        }
      })
    </script>
  </div>
</body>
</html>
